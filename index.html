<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPU Course Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-container">
        
        <div id="screen-login" class="screen active">
            <div class="logo-container">
                <img src="assets/logo.png" alt="SPU Logo" class="app-logo">
            </div>
            <h2>เข้าสู่ระบบ</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" placeholder="Username / รหัสนักศึกษา" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="button" class="btn-primary" onclick="switchScreen('screen-courselist')">Login</button>
            </form>
            <div class="extra-links">
                <a href="#">ลืมรหัสผ่าน?</a> | <a href="#" onclick="alert('ไปหน้าสมัครสมาชิก')">สมัครสมาชิก (Sign Up)</a>
            </div>
        </div>

        <div id="screen-courselist" class="screen">
            <div class="header">
                <button class="btn-back" onclick="switchScreen('screen-login')">❮</button>
                <h2>รายวิชาที่เปิดสอน</h2>
                <div style="width: 30px;"></div> </div>
            <div class="course-list" id="course-list-container">
                </div>
        </div>

        <div id="screen-coursedetail" class="screen">
            <div class="header">
                <button class="btn-back" onclick="switchScreen('screen-courselist')">❮</button>
                <h2>รายละเอียดวิชา</h2>
                <div style="width: 30px;"></div>
            </div>
            <div class="course-detail-content" id="course-detail-content">
                </div>
            <button class="btn-primary btn-register" onclick="switchScreen('screen-result')">ลงทะเบียนเรียน (Register)</button>
        </div>

        <div id="screen-result" class="screen">
            <div class="header">
                <button class="btn-back" onclick="switchScreen('screen-courselist')">❮</button>
                <h2>ผลการลงทะเบียน</h2>
                <div style="width: 30px;"></div>
            </div>
            <div class="result-content">
                <div class="success-icon">✓</div>
                <h3>ลงทะเบียนสำเร็จ!</h3>
                <p>ระบบได้ทำการบันทึกข้อมูลการลงทะเบียนเรียนของคุณเรียบร้อยแล้ว โปรดตรวจสอบสถานะอีกครั้ง</p>
                <button class="btn-primary" onclick="switchScreen('screen-courselist')">กลับสู่หน้ารายวิชา</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
