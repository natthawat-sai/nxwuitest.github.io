<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPU Course Registration</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <div class="glass-container">
        
        <div id="screen-login" class="screen active">
            <div class="logo-container">
                <img src="logo.png" alt="SPU Logo" class="app-logo" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<h1 class=\'text-gradient\'>SPU REG</h1>');">
            </div>
            <h2 class="title-main">เข้าสู่ระบบ</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="username-input" placeholder="Username / รหัสนักศึกษา" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="remember-password">
                    <label for="remember-password">จดจำรหัสผ่าน</label>
                </div>
                <button type="button" class="btn-primary" onclick="handleLogin()">เข้าสู่ระบบ</button>
            </form>
            <div class="extra-links">
                <a href="#">ลืมรหัสผ่าน?</a> <span>•</span> <a href="#">สมัครสมาชิก</a>
            </div>
        </div>

        <div id="screen-courselist" class="screen has-nav">
            <div class="header">
                <div class="spacer"></div>
                <h2>รายวิชา</h2>
                <div class="user-info">
                    <span class="user-icon">😎</span> 
                    <span class="current-username">User</span>
                </div>
            </div>
            <div class="course-list" id="course-list-container">
                </div>
        </div>

        <div id="screen-coursedetail" class="screen has-nav">
            <div class="header">
                <button class="btn-back" onclick="switchScreen('screen-courselist')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h2>รายละเอียด</h2>
                <div class="user-info">
                    <span class="user-icon">😎</span> 
                    <span class="current-username">User</span>
                </div>
            </div>
            <div class="course-detail-content" id="course-detail-content">
                </div>
            <div id="detail-action-container" class="action-footer">
                </div>
        </div>

        <div id="screen-result" class="screen has-nav">
            <div class="header">
                <div class="spacer"></div>
                <h2>สถานะ</h2>
                <div class="spacer"></div>
            </div>
            <div class="result-content">
                <div class="success-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h3 class="text-gradient">สำเร็จ!</h3>
                <p>ลงทะเบียนรายวิชาเรียบร้อยแล้ว</p>
                <div class="result-actions">
                    <button class="btn-primary" onclick="renderMySchedule(); switchScreen('screen-schedule');">ดูตารางเรียน</button>
                    <button class="btn-secondary" onclick="switchScreen('screen-courselist')">กลับไปหน้ารายวิชา</button>
                </div>
            </div>
        </div>

        <div id="screen-schedule" class="screen has-nav">
            <div class="header">
                <div class="spacer"></div>
                <h2>ตารางเรียน</h2>
                <div class="user-info">
                    <span class="user-icon">😎</span> 
                    <span class="current-username">User</span>
                </div>
            </div>
            <div class="schedule-content">
                <div class="credit-summary">
                    <p>หน่วยกิตสะสม</p>
                    <h3><span id="total-credits">0</span> <span>CR</span></h3>
                </div>
                <div id="my-courses-list" class="my-courses-wrapper">
                    </div>
            </div>
        </div>

        <div id="bottom-nav" class="bottom-nav" style="display: none;">
            <div class="nav-item active" id="nav-home" onclick="switchScreen('screen-courselist')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                <span class="nav-text">รายวิชา</span>
            </div>
            <div class="nav-item" id="nav-schedule" onclick="renderMySchedule(); switchScreen('screen-schedule')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="nav-text">ตารางเรียน</span>
            </div>
            <div class="nav-item" id="nav-logout" onclick="logout()">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="nav-text">ออกระบบ</span>
            </div>
        </div>

    </div>

    <script src="script.js?v=5"></script>
</body>
</html>
